# Optional: Use when you need a fresh airesderio DB for local dev.
# If you already have Postgres running (e.g. for other projects), just create the database:
#   CREATE DATABASE airesderio;
#   psql -d airesderio -f fe/scripts/schema.sql
#
# To use this compose file:
#   cd fe && docker-compose up -d
#   DATABASE_URL=postgresql://postgres:postgres@localhost:5432/airesderio

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airesderio
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql
